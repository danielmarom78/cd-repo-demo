apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-cd-prod
  namespace: openshift-gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/danielmarom78/cd-repo-demo.git
      revision: main
      directories:
      - path: "Production/*/*"   
  template:
    metadata:
      name: '{{path[1]}}-{{path[2]}}-{{prod}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/danielmarom78/cd-repo-demo.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
