apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-cd
  namespace: openshift-gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/danielmarom78/cd-repo-demo.git
      revision: main
      directories:
      - path: "Production/*"   
  template:
    metadata:
      name: '{{global.nameOverride}}-{{global.serviceName}}-{{path[1]}}-{{prod}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/danielmarom78/cd-repo-demo.git
        targetRevision: main
        path: 'Application'
        helm:
          parameters:
           - name: global.namespace
             value: prod
          valueFiles:
          - '{{path[1]}}/{{path[2]}}/{{path.filename}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
