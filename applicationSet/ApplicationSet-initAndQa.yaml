apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-cd-initandqa
  namespace: openshift-gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/danielmarom78/cd-repo-demo.git
      revision: main
      files:
      - path: "Application/*/qa/values-*.yaml" 
      - path: "Application/*/init/values-*.yaml"   
  template:
    metadata:
      name: '{{path[2]}}-{{global.serviceName}}-{{path[1]}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/danielmarom78/cd-repo-demo.git
        targetRevision: main
        path: '{{path[0]}}'
        helm:
          parameters:
           - name: global.namespace
             value: '{{path[2]}}'
          valueFiles:
          - '{{path[1]}}/{{path[2]}}/{{path.filename}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path[2]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
