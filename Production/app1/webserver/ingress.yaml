apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    route.openshift.io/destination-ca-certificate-secret: webserver-ca-cert
    route.openshift.io/termination: edge
  labels:
    app.kubernetes.io/instance: demo-webserver-prod-app1
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: demo
    app.kubernetes.io/part-of: demo
    app.openshift.io/runtime: dotnet
  name: demo-webserver-prod-app1
  namespace: prod
spec:
  rules:
    - host: app1-webserver-demo-prod.cluster-2mbd4.dynamic.redhatworkshops.io
      http:
        paths:
          - webserver:
              service:
                name: demo-webserver
                port:
                  number: 8080
            path: /
            pathType: Prefix
  tls:
    - {}